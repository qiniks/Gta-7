<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);margin:-1px;">Изометрическая мини-игра в стиле GTA Chinatown Wars: вождение, пешеходы, трафик, угон машин и полиция.</h2>
<div style="padding:0.5rem 0;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 14px;min-width:104px;">
      <div style="font-size:12px;color:var(--color-text-secondary);">Деньги</div>
      <div id="cash" style="font-size:20px;font-weight:500;">$0</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 14px;">
      <div style="font-size:12px;color:var(--color-text-secondary);">Розыск</div>
      <div id="stars" style="font-size:15px;letter-spacing:2px;"></div>
    </div>
    <div id="hint" style="font-size:13px;color:var(--color-text-secondary);margin-left:auto;text-align:right;line-height:1.5;"></div>
  </div>
  <div style="position:relative;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px;">
    <canvas id="gta" width="648" height="430" style="display:block;width:100%;height:auto;border-radius:var(--border-radius-md);"></canvas>
    <div id="ovl" style="position:absolute;inset:10px;border-radius:var(--border-radius-md);background:rgba(15,15,14,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;">
      <div id="ovl-title" style="color:#F1EFE8;font-size:22px;font-weight:500;">GTA 7: Chinatown</div>
      <div id="ovl-sub" style="color:#D3D1C7;font-size:14px;max-width:420px;text-align:center;line-height:1.55;">Собери $2500. Деньги валяются на дорогах, прохожие делятся кошельками. Машины можно угонять, но полиция не дремлет: поймают — отберут половину.</div>
      <div style="display:flex;gap:10px;">
        <button id="btn-start" style="background:#EF9F27;border:none;color:#412402;font-weight:500;padding:10px 22px;border-radius:var(--border-radius-md);cursor:pointer;font-size:15px;">Завести мотор</button>
        <button id="btn-next" style="display:none;padding:10px 18px;font-size:15px;">create gta8 ↗</button>
      </div>
    </div>
  </div>
</div>
<script>
const cv=document.getElementById('gta'),ctx=cv.getContext('2d');
const W=648,H=430,DPR=Math.min(2,window.devicePixelRatio||1);
cv.width=W*DPR;cv.height=H*DPR;ctx.scale(DPR,DPR);
const CX=W/2,CY=H*0.6;
const P=170,RH=27,SW=12,NL=10,WHI=(NL-1)*P;
const GOAL=2500;
const cashEl=document.getElementById('cash'),starsEl=document.getElementById('stars'),hintEl=document.getElementById('hint');
const ovl=document.getElementById('ovl'),ovlT=document.getElementById('ovl-title'),ovlS=document.getElementById('ovl-sub');
const btnS=document.getElementById('btn-start'),btnN=document.getElementById('btn-next');
const rand=Math.random;
const DIRA=[0,Math.PI/2,Math.PI,-Math.PI/2];
const PALS=[['#6b6a64','#57564f','#454440'],['#7d5a4c','#684a3e','#523a30'],['#5d6b78','#4c5864','#3d4751'],['#6e6557','#5a5347','#474138']];
const TCOLS=['#8a8782','#6f8fae','#a06a5a','#7a9367','#9b8eb8','#b8a36a'];
const PCOLS=['#b08c5f','#7f8da0','#9a7186','#6f9a83','#a8a08b','#8c6f5a'];
const blocks=[],bgrid={};
for(let i=0;i<NL-1;i++)for(let j=0;j<NL-1;j++){
  const x0=i*P+RH,y0=j*P+RH,sz=P-2*RH;
  const b={x0,y0,sz,park:rand()<0.13};
  if(b.park){
    b.trees=[];const n=2+((rand()*2)|0);
    for(let t=0;t<n;t++)b.trees.push({x:x0+16+rand()*(sz-32),y:y0+16+rand()*(sz-32),r:7+rand()*4});
  }else{
    const bw=sz-2*SW-rand()*22,bh=sz-2*SW-rand()*22;
    b.bx=x0+(sz-bw)/2;b.by=y0+(sz-bh)/2;b.bw=bw;b.bh=bh;
    b.hgt=26+rand()*70;b.pal=PALS[(rand()*PALS.length)|0];
  }
  blocks.push(b);bgrid[i+','+j]=b;
}
function hitBuilding(x,y,r){
  if(x<-19||x>WHI+19||y<-19||y>WHI+19)return true;
  const gi=Math.floor((x-RH)/P),gj=Math.floor((y-RH)/P);
  for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){
    const b=bgrid[(gi+di)+','+(gj+dj)];
    if(!b)continue;
    if(b.park){
      for(const t of b.trees)if(Math.hypot(x-t.x,y-t.y)<r+3)return true;
      continue;
    }
    const nx=Math.max(b.bx,Math.min(x,b.bx+b.bw)),ny=Math.max(b.by,Math.min(y,b.by+b.bh));
    if((x-nx)*(x-nx)+(y-ny)*(y-ny)<r*r)return true;
  }
  return false;
}
const cam={x:0,y:0,rot:-Math.PI/2};
let shake=0,shakeX=0,shakeY=0;
function proj(wx,wy,h){
  const dx=wx-cam.x,dy=wy-cam.y;
  const c=Math.cos(cam.rot),s=Math.sin(cam.rot);
  return{x:CX+dx*c-dy*s+shakeX,y:CY+(dx*s+dy*c)*0.5-(h||0)+shakeY};
}
function awrap(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a;}
function mkCar(x,y,a,col,kind){return{x,y,a,va:a,s:0,col,kind};}
let state='idle',mode='drive',frame=0;
let cash=0,heat=0,bustT=0,invuln=0,lastStars=-1,copContact=false;
let pcar=mkCar(250,13,0,'#EF9F27','pc');
let player={x:0,y:0,fa:0,col:'#EF9F27'};
let cars=[],cops=[],peds=[],money=[],floats=[];
const keys={},pressed={space:false};
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
  if(k===' '&&!keys[k])pressed.space=true;
  keys[k]=true;
});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
function key(){for(let i=0;i<arguments.length;i++)if(keys[arguments[i]])return true;return false;}
function ppos(){return mode==='drive'?pcar:player;}
function floater(x,y,txt,col){floats.push({x,y,h:16,life:55,txt,col:col||'#C0DD97'});}
function crime(n){heat=Math.min(5,heat+n);}
function randSidewalk(pp,R){
  const vert=rand()<0.5;
  const k=(rand()*NL)|0;
  let side=rand()<0.5?33:-33;
  if(k===0)side=33;if(k===NL-1)side=-33;
  const u=k*P+side;
  const base=vert?pp.y:pp.x;
  const along=Math.max(6,Math.min(WHI-6,base+(rand()*2-1)*R));
  return vert?{x:u,y:along}:{x:along,y:u};
}
function retarget(pd){const pt=randSidewalk(pd,200);pd.tx=pt.x;pd.ty=pt.y;}
function spawnPed(){
  const pp=ppos();
  for(let t=0;t<40;t++){
    const pt=randSidewalk(pp,560);
    if(Math.hypot(pt.x-pp.x,pt.y-pp.y)>120){
      const pd={x:pt.x,y:pt.y,tx:pt.x,ty:pt.y,flee:0,fx:0,fy:0,col:PCOLS[(rand()*PCOLS.length)|0]};
      retarget(pd);peds.push(pd);return;
    }
  }
}
function newMoney(){
  const pp=ppos();
  for(let t=0;t<60;t++){
    const vert=rand()<0.5,k=(rand()*NL)|0,u=k*P,off=(rand()*2-1)*15;
    const base=vert?pp.y:pp.x;
    const along=Math.max(10,Math.min(WHI-10,base+(rand()*2-1)*430));
    const x=vert?u+off:along,y=vert?along:u+off;
    if(Math.hypot(x-pp.x,y-pp.y)>90)return{x,y,v:100};
  }
  return{x:765,y:13,v:100};
}
function spawnTraffic(){
  const pp=ppos();
  for(let t=0;t<30;t++){
    const horiz=rand()<0.5,k=(rand()*NL)|0,u=k*P;
    const base=horiz?pp.x:pp.y;
    const along=Math.max(30,Math.min(WHI-30,base+(rand()<0.5?-1:1)*(300+rand()*260)));
    let dir,x,y;
    if(horiz){dir=rand()<0.5?0:2;x=along;y=u+(dir===0?13:-13);}
    else{dir=rand()<0.5?1:3;y=along;x=u+(dir===1?-13:13);}
    if(Math.hypot(x-pp.x,y-pp.y)<260)continue;
    if(x<-20||x>WHI+20||y<-20||y>WHI+20)continue;
    const c=mkCar(x,y,DIRA[dir],TCOLS[(rand()*TCOLS.length)|0],'traffic');
    c.dir=dir;c.line=u;c.s=1.2;cars.push(c);return;
  }
}
function spawnCop(){
  const pp=ppos();
  for(let t=0;t<30;t++){
    const vert=rand()<0.5,k=(rand()*NL)|0,u=k*P;
    const base=vert?pp.y:pp.x;
    const along=Math.max(20,Math.min(WHI-20,base+(rand()<0.5?-1:1)*(330+rand()*150)));
    const x=vert?u:along,y=vert?along:u;
    if(Math.hypot(x-pp.x,y-pp.y)<260)continue;
    cops.push(mkCar(x,y,Math.atan2(pp.y-y,pp.x-x),'#ECE9E1','cop'));return;
  }
}
function turnCar(c,ic){
  const horiz=(c.dir===0||c.dir===2);
  const cand=horiz?[1,3]:[0,2];
  const valid=cand.filter(nd=>{const sg=(nd===0||nd===1)?1:-1;return sg>0?c.line<WHI-60:c.line>60;});
  if(!valid.length)return false;
  const nd=valid[(rand()*valid.length)|0];
  c.dir=nd;
  if(nd===0)c.y=ic+13;else if(nd===2)c.y=ic-13;else if(nd===1)c.x=ic-13;else c.x=ic+13;
  c.line=ic;
  return true;
}
function stepTraffic(c){
  const ang=DIRA[c.dir],hx=Math.cos(ang),hy=Math.sin(ang);
  let blocked=false;
  const ahead=(ox,oy,rr)=>{const dx=ox-c.x,dy=oy-c.y;const f=dx*hx+dy*hy,l=Math.abs(dy*hx-dx*hy);return f>4&&f<rr&&l<13;};
  for(const o of cars){if(o!==c&&ahead(o.x,o.y,44)){blocked=true;break;}}
  if(!blocked)for(const o of cops){if(ahead(o.x,o.y,44)){blocked=true;break;}}
  if(!blocked&&mode==='foot'&&ahead(player.x,player.y,34))blocked=true;
  if(!blocked)for(const pd of peds){if(ahead(pd.x,pd.y,26)){blocked=true;break;}}
  c.s=blocked?Math.max(0,c.s-0.18):Math.min(1.55,c.s+0.045);
  if(c.s>0.05){
    const horiz=(c.dir===0||c.dir===2);
    const prev=horiz?c.x:c.y;
    c.x+=hx*c.s;c.y+=hy*c.s;
    const cur=horiz?c.x:c.y;
    const m=Math.round(((prev+cur)/2)/P),ic=m*P;
    if((prev-ic)*(cur-ic)<=0&&Math.abs(cur-prev)>0.01){
      if(rand()<0.4)turnCar(c,ic);
    }else{
      const sg=(c.dir===0||c.dir===1)?1:-1;
      const along=horiz?c.x:c.y;
      if((sg>0&&along>WHI-30)||(sg<0&&along<30)){
        const icc=Math.round(along/P)*P;
        if(!turnCar(c,icc)){
          c.dir=(c.dir+2)%4;
          if(c.dir===0)c.y=c.line+13;else if(c.dir===2)c.y=c.line-13;else if(c.dir===1)c.x=c.line-13;else c.x=c.line+13;
        }
      }
    }
  }
  c.va+=awrap(DIRA[c.dir]-c.va)*0.18;
}
function stepCop(c){
  const t=ppos();
  const want=Math.atan2(t.y-c.y,t.x-c.x);
  const d=awrap(want-c.a);
  c.a+=Math.max(-0.06,Math.min(0.06,d));
  if(Math.cos(d)>0.2)c.s=Math.min(4.1,c.s+0.12);else c.s*=0.93;
  c.s*=0.975;
  const px=c.x,py=c.y;
  c.x+=Math.cos(c.a)*c.s;c.y+=Math.sin(c.a)*c.s;
  if(hitBuilding(c.x,c.y,9)){c.x=px;c.y=py;c.s*=-0.4;}
  c.va=c.a;
  const dd=Math.hypot(c.x-t.x,c.y-t.y);
  if(invuln>0)return;
  if(mode==='foot'&&dd<15){busted();return;}
  if(mode==='drive'&&dd<24){
    copContact=true;
    if(Math.abs(pcar.s)<1){bustT++;if(bustT>50){busted();return;}}
    else{
      const ang=Math.atan2(pcar.y-c.y,pcar.x-c.x);
      pcar.x+=Math.cos(ang)*2;pcar.y+=Math.sin(ang)*2;
      pcar.s*=0.85;c.s*=0.6;shake=Math.max(shake,4);
    }
  }
}
function stepPeds(){
  for(let i=peds.length-1;i>=0;i--){
    const pd=peds[i];
    if(mode==='drive'&&Math.abs(pcar.s)>2&&Math.hypot(pcar.x-pd.x,pcar.y-pd.y)<60){
      const ang=Math.atan2(pd.y-pcar.y,pd.x-pcar.x);
      pd.fx=Math.cos(ang);pd.fy=Math.sin(ang);pd.flee=45;
    }
    let vx,vy,spd;
    if(pd.flee>0){pd.flee--;vx=pd.fx;vy=pd.fy;spd=1.35;}
    else{
      const dx=pd.tx-pd.x,dy=pd.ty-pd.y,dl=Math.hypot(dx,dy);
      if(dl<5){retarget(pd);continue;}
      vx=dx/dl;vy=dy/dl;spd=0.5;
    }
    const nx=pd.x+vx*spd,ny=pd.y+vy*spd;
    if(!hitBuilding(nx,ny,4)){pd.x=nx;pd.y=ny;}else retarget(pd);
    if(mode==='drive'&&Math.abs(pcar.s)>1.1&&Math.hypot(pcar.x-pd.x,pcar.y-pd.y)<13){
      cash+=20;crime(1);floater(pd.x,pd.y,'+$20');shake=5;peds.splice(i,1);hud();
    }
  }
  for(let i=peds.length-1;i>=0;i--){
    const pp=ppos();
    if(Math.hypot(peds[i].x-pp.x,peds[i].y-pp.y)>750)peds.splice(i,1);
  }
  while(peds.length<24)spawnPed();
}
function enterCar(c){
  if(c.kind==='traffic'){
    crime(1);floater(c.x,c.y,'Угон!','#F1EFE8');
    const ang=c.va+Math.PI/2;
    const jx=c.x+Math.cos(ang)*14,jy=c.y+Math.sin(ang)*14;
    const pd={x:jx,y:jy,tx:jx,ty:jy,flee:70,fx:Math.cos(ang),fy:Math.sin(ang),col:PCOLS[(rand()*PCOLS.length)|0]};
    retarget(pd);peds.push(pd);
  }
  c.kind='pc';c.s=0;pcar=c;mode='drive';setHint();
}
function exitCar(){
  pcar.s=0;pcar.kind='free';
  for(const sgn of[1,-1]){
    const ang=pcar.a+sgn*Math.PI/2;
    const ex=pcar.x+Math.cos(ang)*17,ey=pcar.y+Math.sin(ang)*17;
    if(!hitBuilding(ex,ey,4)){player.x=ex;player.y=ey;mode='foot';setHint();return;}
  }
  player.x=pcar.x;player.y=pcar.y-20;mode='foot';setHint();
}
function stepPlayer(){
  if(mode==='drive'){
    const up=key('w','arrowup','ц'),dn=key('s','arrowdown','ы'),lf=key('a','arrowleft','ф'),rt=key('d','arrowright','в');
    if(up)pcar.s=Math.min(4.6,pcar.s+0.13);
    if(dn)pcar.s=pcar.s>0.3?pcar.s-0.22:Math.max(-1.9,pcar.s-0.1);
    pcar.s*=0.976;
    const turn=(rt?1:0)-(lf?1:0);
    pcar.a+=turn*0.052*Math.min(1,Math.abs(pcar.s)/1.1)*(pcar.s<0?-1:1);
    pcar.va=pcar.a;
    const ox=pcar.x,oy=pcar.y;
    pcar.x+=Math.cos(pcar.a)*pcar.s;pcar.y+=Math.sin(pcar.a)*pcar.s;
    if(hitBuilding(pcar.x,pcar.y,9)){pcar.x=ox;pcar.y=oy;pcar.s*=-0.35;shake=Math.max(shake,5);}
    for(const o of cars){
      if(o===pcar)continue;
      const dd=Math.hypot(o.x-pcar.x,o.y-pcar.y);
      if(dd<22&&dd>0.01){
        const ang=Math.atan2(pcar.y-o.y,pcar.x-o.x);
        pcar.x=o.x+Math.cos(ang)*22;pcar.y=o.y+Math.sin(ang)*22;
        pcar.s*=0.6;if(o.kind==='traffic')o.s=0;shake=Math.max(shake,3);
      }
    }
    if(pressed.space){
      if(Math.abs(pcar.s)<1.2)exitCar();
      else floater(pcar.x,pcar.y,'Сначала остановись','#F1EFE8');
    }
  }else{
    let ix=(key('d','arrowright','в')?1:0)-(key('a','arrowleft','ф')?1:0);
    let iy=(key('s','arrowdown','ы')?1:0)-(key('w','arrowup','ц')?1:0);
    if(ix||iy){
      const il=Math.hypot(ix,iy);ix/=il;iy/=il;
      const c=Math.cos(cam.rot),s=Math.sin(cam.rot);
      const wx=ix*c+iy*s,wy=-ix*s+iy*c;
      const nx=player.x+wx*1.5,ny=player.y+wy*1.5;
      if(!hitBuilding(nx,ny,4)){player.x=nx;player.y=ny;player.fa=Math.atan2(wy,wx);}
    }
    if(pressed.space){
      let best=null,bd=30;
      for(const c of cars){
        const dd=Math.hypot(c.x-player.x,c.y-player.y);
        if(dd<bd&&Math.abs(c.s)<2.5){bd=dd;best=c;}
      }
      if(best)enterCar(best);
    }
  }
  const pp=ppos();
  for(const m of money){
    if(Math.hypot(m.x-pp.x,m.y-pp.y)<(mode==='drive'?16:10)){
      cash+=m.v;floater(m.x,m.y,'+$'+m.v);
      const nm=newMoney();m.x=nm.x;m.y=nm.y;
      hud();
      if(cash>=GOAL){win();return;}
    }
  }
}
function step(){
  copContact=false;
  stepPlayer();
  if(state!=='play')return;
  for(const c of cars)if(c.kind==='traffic')stepTraffic(c);
  stepPeds();
  if(state!=='play')return;
  heat=Math.max(0,heat-0.0023);
  const st=Math.floor(heat);
  while(cops.length<st)spawnCop();
  if(cops.length>st)cops.length=st;
  for(const c of cops){stepCop(c);if(state!=='play')return;}
  if(!copContact)bustT=Math.max(0,bustT-2);
  if(invuln>0)invuln--;
  const pp=ppos();
  for(let i=cars.length-1;i>=0;i--){
    const c=cars[i];
    if(c.kind==='traffic'&&Math.hypot(c.x-pp.x,c.y-pp.y)>800)cars.splice(i,1);
  }
  let tc=0;for(const c of cars)if(c.kind==='traffic')tc++;
  while(tc<9){spawnTraffic();tc++;}
  if(st!==lastStars)hud();
  pressed.space=false;
}
function busted(){
  state='busted';
  cash=Math.floor(cash/2/10)*10;
  heat=0;cops.length=0;bustT=0;
  hud();
  ovlT.textContent='Busted!';
  ovlS.textContent='Полиция забрала половину. Осталось $'+cash+'. Тебя выпустили у участка — машина осталась где-то в городе.';
  btnS.textContent='Продолжить';btnN.style.display='none';
  ovl.style.display='flex';
}
function win(){
  state='win';hud();
  ovlT.textContent='Город твой';
  ovlS.textContent='$'+GOAL+' собраны, полиция осталась ни с чем. GTA 7 пройдена на 100%.';
  btnS.textContent='Ещё раз';btnN.style.display='';
  ovl.style.display='flex';
}
function respawnBust(){
  mode='foot';player.x=33;player.y=205;invuln=210;bustT=0;
  let near=false;
  for(const c of cars)if(c.kind!=='traffic'&&Math.hypot(c.x-33,c.y-205)<160)near=true;
  if(!near)cars.push(mkCar(13,170,-Math.PI/2,'#EF9F27','free'));
  cam.x=player.x;cam.y=player.y;
  setHint();hud();
}
function reset(){
  cash=0;heat=0;bustT=0;invuln=0;mode='drive';
  pcar=mkCar(250,13,0,'#EF9F27','pc');
  cars=[pcar];cops=[];peds=[];money=[];floats=[];
  for(let i=0;i<8;i++)money.push(newMoney());
  for(let i=0;i<24;i++)spawnPed();
  for(let i=0;i<9;i++)spawnTraffic();
  cam.x=pcar.x;cam.y=pcar.y;cam.rot=-Math.PI/2;
  hud();setHint();
}
function hud(){
  cashEl.textContent='$'+cash;
  const st=Math.floor(heat);lastStars=st;
  let s='';
  for(let i=0;i<5;i++)s+='<i class="ti ti-star" style="color:'+(i<st?'#EF9F27':'var(--color-border-secondary)')+'" aria-hidden="true"></i>';
  starsEl.innerHTML=s;
}
function setHint(){
  hintEl.innerHTML=mode==='drive'
    ?'WASD / стрелки — газ и руль<br>Пробел — выйти из машины'
    :'WASD / стрелки — ходьба<br>Пробел — сесть в машину / угнать';
}
function updateCam(){
  const pp=ppos();
  let tx=pp.x,ty=pp.y,tr=cam.rot;
  if(mode==='drive'){tx+=Math.cos(pcar.a)*42;ty+=Math.sin(pcar.a)*42;tr=-Math.PI/2-pcar.a;}
  cam.x+=(tx-cam.x)*0.085;cam.y+=(ty-cam.y)*0.085;
  cam.rot+=awrap(tr-cam.rot)*0.075;
}
function fq(p,col){
  ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);
  for(let i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y);
  ctx.closePath();ctx.fill();
}
function shade(col,f){
  const n=parseInt(col.slice(1),16);
  const r=((n>>16)&255)*f|0,g=((n>>8)&255)*f|0,b=(n&255)*f|0;
  return'rgb('+r+','+g+','+b+')';
}
function drawGround(){
  ctx.fillStyle='#2C2C2A';ctx.fillRect(0,0,W,H);
  for(const b of blocks){
    const cx=b.x0+b.sz/2,cy=b.y0+b.sz/2;
    if(Math.abs(cx-cam.x)+Math.abs(cy-cam.y)>650)continue;
    fq([proj(b.x0,b.y0,0),proj(b.x0+b.sz,b.y0,0),proj(b.x0+b.sz,b.y0+b.sz,0),proj(b.x0,b.y0+b.sz,0)],'#3B3A36');
    const i0=b.x0+SW,i1=b.x0+b.sz-SW,j0=b.y0+SW,j1=b.y0+b.sz-SW;
    fq([proj(i0,j0,0),proj(i1,j0,0),proj(i1,j1,0),proj(i0,j1,0)],b.park?'#2E4023':'#33322E');
  }
  ctx.strokeStyle='#55524B';ctx.lineWidth=2;ctx.beginPath();
  for(let k=0;k<NL;k++){
    const u=k*P;
    if(Math.abs(u-cam.x)<420){
      const y0=Math.max(0,cam.y-360),y1=Math.min(WHI,cam.y+360);
      for(let y=Math.floor(y0/30)*30;y<y1;y+=30){
        const a=proj(u,y,0),b=proj(u,Math.min(y+14,y1),0);
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      }
    }
    if(Math.abs(u-cam.y)<420){
      const x0=Math.max(0,cam.x-360),x1=Math.min(WHI,cam.x+360);
      for(let x=Math.floor(x0/30)*30;x<x1;x+=30){
        const a=proj(x,u,0),b=proj(Math.min(x+14,x1),u,0);
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      }
    }
  }
  ctx.stroke();
  const bp=[proj(-27,-27,0),proj(WHI+27,-27,0),proj(WHI+27,WHI+27,0),proj(-27,WHI+27,0)];
  ctx.strokeStyle='#191917';ctx.lineWidth=14;ctx.beginPath();
  ctx.moveTo(bp[0].x,bp[0].y);for(let i=1;i<4;i++)ctx.lineTo(bp[i].x,bp[i].y);
  ctx.closePath();ctx.stroke();
}
function drawBuilding(b){
  const c4=[proj(b.bx,b.by,0),proj(b.bx+b.bw,b.by,0),proj(b.bx+b.bw,b.by+b.bh,0),proj(b.bx,b.by+b.bh,0)];
  const t4=c4.map(p=>({x:p.x,y:p.y-b.hgt}));
  const cy=(c4[0].y+c4[1].y+c4[2].y+c4[3].y)/4;
  const cx=(c4[0].x+c4[1].x+c4[2].x+c4[3].x)/4;
  for(let e=0;e<4;e++){
    const p1=c4[e],p2=c4[(e+1)%4];
    if((p1.y+p2.y)/2>cy)fq([p1,p2,t4[(e+1)%4],t4[e]],((p1.x+p2.x)/2<cx)?b.pal[1]:b.pal[2]);
  }
  fq(t4,b.pal[0]);
  ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(t4[0].x,t4[0].y);
  for(let i=1;i<4;i++)ctx.lineTo(t4[i].x,t4[i].y);
  ctx.closePath();ctx.stroke();
}
function drawTree(t){
  const s0=proj(t.x,t.y,0);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(s0.x,s0.y,t.r*0.9,t.r*0.45,0,0,7);ctx.fill();
  ctx.strokeStyle='#5a4632';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(s0.x,s0.y);ctx.lineTo(s0.x,s0.y-11);ctx.stroke();
  ctx.fillStyle='#3F5E2E';
  ctx.beginPath();ctx.arc(s0.x,s0.y-14,t.r,0,7);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;ctx.stroke();
}
function carQuad(c,l,w,h,bk){
  const ca=Math.cos(c.va),sa=Math.sin(c.va);
  const pts=[[l/2+bk,w/2],[l/2+bk,-w/2],[-l/2+bk,-w/2],[-l/2+bk,w/2]];
  return pts.map(p=>proj(c.x+p[0]*ca-p[1]*sa,c.y+p[0]*sa+p[1]*ca,h));
}
function drawCar(c){
  fq(carQuad(c,27,15,0,0),'rgba(0,0,0,0.35)');
  const b0=carQuad(c,26,13,2,0),b1=carQuad(c,26,13,7,0);
  const cy=(b0[0].y+b0[1].y+b0[2].y+b0[3].y)/4;
  const cx=(b0[0].x+b0[1].x+b0[2].x+b0[3].x)/4;
  for(let e=0;e<4;e++){
    const p1=b0[e],p2=b0[(e+1)%4];
    if((p1.y+p2.y)/2>cy)fq([p1,p2,b1[(e+1)%4],b1[e]],((p1.x+p2.x)/2<cx)?shade(c.col,0.72):shade(c.col,0.52));
  }
  fq(b1,c.col);
  fq(carQuad(c,11,10,10,-2),'#23262B');
  if(c.kind==='cop')fq(carQuad(c,4,8,11,-1),((frame>>3)%2)?'#E24B4A':'#378ADD');
}
function drawPed(pd){
  const s0=proj(pd.x,pd.y,0);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(s0.x,s0.y,4,2,0,0,7);ctx.fill();
  ctx.fillStyle=pd.col;
  ctx.beginPath();ctx.arc(s0.x,s0.y-5.5,3.4,0,7);ctx.fill();
  ctx.fillStyle='#d9af8b';
  ctx.beginPath();ctx.arc(s0.x,s0.y-10,2.3,0,7);ctx.fill();
}
function drawCoin(m){
  const bob=Math.sin(frame*0.1+m.x)*1.5;
  const s0=proj(m.x,m.y,0);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(s0.x,s0.y,4.5,2.2,0,0,7);ctx.fill();
  ctx.fillStyle='#97C459';
  ctx.beginPath();ctx.arc(s0.x,s0.y-6-bob,5,0,7);ctx.fill();
  ctx.strokeStyle='#2e4d12';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#173404';ctx.font='500 9px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$',s0.x,s0.y-5.5-bob);
}
function drawFloats(){
  ctx.font='500 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i];
    f.h+=0.5;f.life--;
    if(f.life<=0){floats.splice(i,1);continue;}
    ctx.globalAlpha=Math.min(1,f.life/40);
    const s0=proj(f.x,f.y,f.h);
    ctx.fillStyle=f.col;ctx.fillText(f.txt,s0.x,s0.y);
  }
  ctx.globalAlpha=1;
}
function drawMinimap(){
  const M=92,mx=W-M-12,my=12,sc=M/(WHI+54);
  ctx.fillStyle='rgba(18,18,17,0.72)';
  ctx.fillRect(mx-3,my-3,M+6,M+6);
  ctx.fillStyle='rgba(125,122,113,0.5)';
  for(const b of blocks)ctx.fillRect(mx+(b.x0+27)*sc,my+(b.y0+27)*sc,b.sz*sc,b.sz*sc);
  ctx.fillStyle='#97C459';
  for(const m of money)ctx.fillRect(mx+(m.x+27)*sc-1,my+(m.y+27)*sc-1,2.5,2.5);
  ctx.fillStyle='#E24B4A';
  for(const c of cops)ctx.fillRect(mx+(c.x+27)*sc-1.5,my+(c.y+27)*sc-1.5,3.5,3.5);
  const pp=ppos(),pa=mode==='drive'?pcar.a:player.fa;
  ctx.save();
  ctx.translate(mx+(pp.x+27)*sc,my+(pp.y+27)*sc);
  ctx.rotate(pa);
  ctx.fillStyle='#F1EFE8';
  ctx.beginPath();ctx.moveTo(4,0);ctx.lineTo(-3,-2.6);ctx.lineTo(-3,2.6);ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.strokeStyle='rgba(125,122,113,0.6)';ctx.lineWidth=1;
  ctx.strokeRect(mx-3,my-3,M+6,M+6);
}
function near(o,r){return Math.abs(o.x-cam.x)+Math.abs(o.y-cam.y)<r;}
function render(){
  shakeX=(rand()*2-1)*shake;shakeY=(rand()*2-1)*shake;shake*=0.85;
  if(shake<0.3)shake=0;
  drawGround();
  const items=[];
  for(const b of blocks){
    const cx=b.x0+b.sz/2,cy=b.y0+b.sz/2;
    if(Math.abs(cx-cam.x)+Math.abs(cy-cam.y)>650)continue;
    if(b.park){for(const t of b.trees)items.push({y:proj(t.x,t.y,0).y,f:drawTree.bind(null,t)});}
    else items.push({y:proj(b.bx+b.bw/2,b.by+b.bh/2,0).y,f:drawBuilding.bind(null,b)});
  }
  for(const m of money)if(near(m,500))items.push({y:proj(m.x,m.y,0).y,f:drawCoin.bind(null,m)});
  for(const c of cars){
    if(!near(c,550))continue;
    if(c===pcar&&mode==='drive'&&invuln>0&&((frame>>2)%2===0))continue;
    items.push({y:proj(c.x,c.y,0).y,f:drawCar.bind(null,c)});
  }
  for(const c of cops)if(near(c,550))items.push({y:proj(c.x,c.y,0).y,f:drawCar.bind(null,c)});
  for(const pd of peds)if(near(pd,500))items.push({y:proj(pd.x,pd.y,0).y,f:drawPed.bind(null,pd)});
  if(mode==='foot'&&!(invuln>0&&((frame>>2)%2===0)))items.push({y:proj(player.x,player.y,0).y,f:drawPed.bind(null,player)});
  items.sort((a,b)=>a.y-b.y);
  for(const it of items)it.f();
  drawFloats();
  drawMinimap();
}
function tick(){
  frame++;
  if(state==='play')step();
  updateCam();
  render();
  requestAnimationFrame(tick);
}
btnS.addEventListener('click',()=>{
  if(state==='idle'||state==='win')reset();
  else if(state==='busted')respawnBust();
  state='play';ovl.style.display='none';
});
btnN.addEventListener('click',()=>sendPrompt('create gta8'));
reset();
state='idle';
tick();
</script>
